<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Strategic AI Intelligence</title>
    <link rel="stylesheet" href="css/shared.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="js/auth.js"></script>
</head>

<body>

    <nav>
        <div class="container">
            <a href="index.html" class="nav-brand" id="nav-brand-name">Adriana So</a>
            <div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
                <div class="nav-links">
                    <a href="services.html">Services</a>
                    <a href="works.html">Works</a>
                    <a href="blog.html">Blog</a>
                    <a href="contact.html" class="active">Contact</a>
                </div>
                <div id="auth-container" class="auth-wrapper"
                    style="min-width: 120px; display: flex; justify-content: flex-end;"></div>
            </div>
        </div>
    </nav>

    <div class="container container-narrow">
        <!-- Contact Section -->
        <section id="contact-section" class="fade-in">
            <h2>Contact</h2>
            <p class="section-intro">For inquiries regarding systemic integration and agentic architectural advisory.
            </p>
            <div class="contact-form-wrapper">
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="Jane Doe">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="jane@example.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject" required>
                            <option value="" disabled selected>Select an inquiry type</option>
                            <option value="advisory">Architectural Advisory</option>
                            <option value="integration">Systemic Integration</option>
                            <option value="speaking">Speaking / Press</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required
                            placeholder="How can I help you?"></textarea>
                    </div>

                    <button type="submit" class="btn btn-submit">Send Inquiry</button>
                    <p id="form-status" class="form-status" style="display: none;"></p>
                </form>

                <div class="secondary-contact">
                    <p class="contact-label">Alternative channels:</p>
                    <div id="contact-links" class="contact-links"
                        style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 10px;">
                        <!-- Injected by JS -->
                    </div>
                </div>
            </div>
        </section>

        <footer class="site-footer fade-in">
            <div class="footer-links">
                <a href="https://github.com/AdrianaSo123" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="https://www.linkedin.com/in/adriana-so-24071219b/" target="_blank"
                    rel="noopener noreferrer">LinkedIn</a>
            </div>
            <div class="footer-copyright">
                &copy; 2026 Adriana So
            </div>
        </footer>
    </div>

    <script type="module">
        import { setupAnimations, loadBrandData } from './js/app.js';

        async function loadContent() {
            try {
                const data = await loadBrandData();
                if (data && data.personal_brand) {
                    document.title = `Contact | ${data.personal_brand.name}`;
                }

                // Handle Form submission
                const form = document.getElementById('contact-form');
                const formStatus = document.getElementById('form-status');

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    // In a real app, this would POST to an endpoint.
                    // For now, simulate success.
                    const submitBtn = form.querySelector('button[type="submit"]');
                    const originalText = submitBtn.textContent;
                    submitBtn.textContent = 'Sending...';
                    submitBtn.disabled = true;

                    setTimeout(() => {
                        formStatus.textContent = 'Inquiry received. I will be in touch shortly.';
                        formStatus.className = 'form-status success';
                        formStatus.style.display = 'block';
                        form.reset();
                        submitBtn.textContent = originalText;
                        submitBtn.disabled = false;

                        setTimeout(() => {
                            formStatus.style.display = 'none';
                        }, 5000);
                    }, 1000);
                });

                // Inject alternative links below form
                const contactLinks = document.getElementById('contact-links');
                contactLinks.innerHTML = '';

                data.connect_links.forEach(link => {
                    const el = document.createElement('a');
                    el.href = link.url;
                    el.className = 'pill-link';

                    if (!link.url.startsWith('mailto')) {
                        el.target = "_blank";
                        el.rel = "noopener noreferrer";
                        el.innerHTML = `${link.platform}<span class="external-icon" style="margin-left: 6px;">↗</span>`;
                    } else {
                        el.textContent = link.platform;
                    }

                    contactLinks.appendChild(el);
                });

                setupAnimations(true);

            } catch (error) {
                console.error('Data hydration failed:', error);
                document.getElementById('contact-links').innerHTML = '<p>Failed to load contact info.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>

</html>
