<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adriana So | Strategic AI Intelligence</title>
    <link rel="stylesheet" href="css/shared.css">
</head>

<body>

    <nav>
        <div class="container">
            <a href="index.html" class="nav-brand" id="nav-brand-name">Adriana So</a>
            <div class="nav-links">
                <a href="services.html">Services</a>
                <a href="works.html">Works</a>
                <a href="blog.html">Blog</a>
            </div>
        </div>
    </nav>

    <div class="container container-narrow">

        <!-- Narrative Profile Section -->
        <main class="hero-split narrative-hero">
            <div class="narrative-bio fade-in" data-delay="1">
                <h1>
                    Systemic<br> AI.<br> <span class="h1-accent">Design.</span>
                </h1>
                <p id="brand-bio"></p>
                <p id="philosophy-text"></p>

                <div class="inline-contact" style="margin-top: 24px; display: flex; gap: 12px; align-items: center;">
                    <span style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 500;">Find me
                        elsewhere:</span>
                    <a href="mailto:hello@adrianaso.com" class="pill-link">Email</a>
                    <a href="https://linkedin.com/in/adrianaso" class="pill-link" target="_blank"
                        rel="noopener noreferrer">LinkedIn</a>
                </div>
            </div>
        </main>

        <!-- Recent Perspectives feed -->
        <section id="recent-posts-section" class="fade-in">
            <h2>Recent Perspectives</h2>

            <div id="recent-posts-container" class="compact-post-list">
                <!-- Injected Posts -->
                <p>Loading journal...</p>
            </div>

            <div class="section-footer">
                <a href="blog.html" class="pill-link" style="margin-top: 20px;">View All Perspectives →</a>
            </div>
        </section>

        <footer>
            Intelligently generated. Deterministically deployed.
        </footer>
    </div>

    <script type="module">
        import { setupAnimations, loadBrandData } from './js/app.js';

        async function loadContent() {
            try {
                // 1. Load Bio and Philosophy Data
                const data = await loadBrandData();
                if (!data) throw new Error('Failed to load content');

                document.title = `${data.personal_brand.name} | ${data.personal_brand.tagline}`;
                document.getElementById('nav-brand-name').textContent = data.personal_brand.name;

                const taglineEl = document.getElementById('brand-tagline');
                if (taglineEl) {
                    taglineEl.textContent = data.personal_brand.tagline;
                }

                document.getElementById('brand-bio').textContent = data.personal_brand.bio;

                if (data.philosophy) {
                    document.getElementById('philosophy-text').textContent = data.philosophy.content;
                }

                // 2. Fetch Latest 3 Blog Posts
                const postsResponse = await fetch('posts/index.json');
                const container = document.getElementById('recent-posts-container');

                if (postsResponse.ok) {
                    const posts = await postsResponse.json();
                    container.innerHTML = '';

                    if (posts.length > 0) {
                        // Sort newest first, take top 3
                        const recentPosts = posts.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 3);

                        recentPosts.forEach(post => {
                            const postEl = document.createElement('a');
                            postEl.href = `post.html?slug=${post.slug}`;
                            postEl.className = 'compact-post-item';
                            postEl.innerHTML = `
                                <div class="compact-post-header">
                                    <div class="compact-post-content">
                                        <h3>${post.title}</h3>
                                    </div>
                                    <div class="compact-post-meta">${post.date}</div>
                                </div>
                                ${post.summary ? `<p class="post-summary">${post.summary}</p>` : ''}
                            `;
                            container.appendChild(postEl);
                        });
                    } else {
                        container.innerHTML = '<p class="empty-state">No journal entries available yet.</p>';
                    }
                } else {
                    container.innerHTML = '<p class="empty-state">Journal temporarily unavailable.</p>';
                }

                setupAnimations(true);

            } catch (error) {
                console.error('Data hydration failed:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>

</html>
