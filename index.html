<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Adriana So - Strategic AI Integrator and Design Engineer bridging systemic AI and artistic UX.">
    <title>Adriana So | Strategic AI Intelligence</title>
    <link rel="stylesheet" href="css/shared.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="js/auth.js"></script>
</head>

<body>

    <nav>
        <div class="container">
            <a href="index.html" class="nav-brand" id="nav-brand-name">Adriana So</a>
            <div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
                <div class="nav-links">
                    <a href="services.html">Services</a>
                    <a href="works.html">Works</a>
                    <a href="blog.html">Blog</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div id="auth-container" class="auth-wrapper"
                    style="min-width: 120px; display: flex; justify-content: flex-end;"></div>
            </div>
        </div>
    </nav>

    <div class="container container-narrow">

        <!-- Narrative Profile Section -->
        <main class="hero-split narrative-hero">
            <div class="narrative-header fade-in" data-delay="1">
                <h1 class="staggered-title">
                    <span class="h1-start">Systemic</span>
                    <span class="h1-middle">AI</span>
                    <span class="h1-end h1-accent">Design</span>
                </h1>
            </div>

            <div class="narrative-bio fade-in" data-delay="2">
                <div class="bio-container">
                    <div class="bio-pill">INTELLIGENCE ARCHITECT</div>
                    <p id="brand-bio" class="lead-paragraph"></p>
                    <p id="philosophy-text"></p>

                    <div class="inline-contact">
                        <span class="contact-label">Find me elsewhere:</span>
                        <div class="contact-buttons">
                            <a href="mailto:hello@adrianaso.com" class="pill-link">Email</a>
                            <a href="https://www.linkedin.com/in/adriana-so-24071219b/" class="pill-link"
                                target="_blank" rel="noopener noreferrer">LinkedIn</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Featured Works feed -->
        <section id="works-section" class="fade-in">
            <h2>Featured Systems</h2>

            <div id="featured-works-container" class="compact-post-list">
                <!-- Injected Works -->
                <p>Loading systems...</p>
            </div>

            <div class="section-footer">
                <a href="works.html" class="pill-link" style="margin-top: 20px;">View All Systems →</a>
            </div>
        </section>

        <footer class="site-footer fade-in">
            <div class="footer-links">
                <a href="https://github.com/AdrianaSo123" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="https://www.linkedin.com/in/adriana-so-24071219b/" target="_blank"
                    rel="noopener noreferrer">LinkedIn</a>
            </div>
            <div class="footer-copyright">
                &copy; 2026 Adriana So
            </div>
        </footer>
    </div>

    <script type="module">
        import { setupAnimations, loadBrandData } from './js/app.js';

        async function loadContent() {
            try {
                // 1. Load Bio and Philosophy Data
                const data = await loadBrandData();
                if (!data) throw new Error('Failed to load content');

                document.title = `${data.personal_brand.name} | ${data.personal_brand.tagline}`;
                document.getElementById('nav-brand-name').textContent = data.personal_brand.name;

                const taglineEl = document.getElementById('brand-tagline');
                if (taglineEl) {
                    taglineEl.textContent = data.personal_brand.tagline;
                }

                document.getElementById('brand-bio').textContent = data.personal_brand.bio;

                if (data.philosophy) {
                    document.getElementById('philosophy-text').textContent = data.philosophy.content;
                }

                // 2. Inject Featured Works on Homepage
                const container = document.getElementById('featured-works-container');
                container.innerHTML = '';

                if (data.selected_works && data.selected_works.length > 0) {
                    const featuredWorks = data.selected_works.slice(0, 3);

                    featuredWorks.forEach(work => {
                        const workEl = document.createElement('a');
                        workEl.href = work.link;
                        workEl.target = "_blank";
                        workEl.rel = "noopener noreferrer";
                        workEl.className = 'compact-post-item';
                        workEl.innerHTML = `
                            <div class="compact-post-header">
                                <div class="compact-post-content">
                                    <h3>${work.title} <span class="external-icon" style="font-size: 0.8rem; color: var(--text-secondary); margin-left: 6px;">↗</span></h3>
                                </div>
                            </div>
                            <p class="post-summary">${work.description}</p>
                        `;
                        container.appendChild(workEl);
                    });
                } else {
                    container.innerHTML = '<p class="empty-state">Secure systems currently offline.</p>';
                }

                setupAnimations(true);

            } catch (error) {
                console.error('Data hydration failed:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>

</html>
