<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Portfolio of strategic AI integrations and design engineering works by Adriana So.">
    <title>Works - Strategic AI Intelligence</title>
    <link rel="stylesheet" href="css/shared.css?v=2">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="js/auth.js"></script>
</head>

<body>

    <nav>
        <div class="container">
            <a href="index.html" class="nav-brand" id="nav-brand-name">Adriana So</a>
            <div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
                <div class="nav-links">
                    <a href="services.html">Services</a>
                    <a href="works.html" class="active">Works</a>
                    <a href="blog.html">Blog</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div id="auth-container" class="auth-wrapper"
                    style="min-width: 120px; display: flex; justify-content: flex-end;"></div>
            </div>
        </div>
    </nav>

    <div class="container container-narrow">
        <!-- Selected Works / Systems Section -->
        <section id="works-section" class="fade-in">
            <h2>Systems</h2>
            <p class="section-intro">A curated portfolio of deterministic AI systems and architectural deployments.</p>
            <div id="works-grid" class="compact-post-list">
                <!-- Injected Works -->
                <p>Loading portfolio...</p>
            </div>
        </section>

        <footer class="site-footer fade-in">
            <div class="footer-links">
                <a href="https://github.com/AdrianaSo123" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="https://www.linkedin.com/in/adriana-so-24071219b/" target="_blank"
                    rel="noopener noreferrer">LinkedIn</a>
            </div>
            <div class="footer-copyright">
                &copy; 2026 Adriana So
            </div>
        </footer>
    </div>

    <script type="module">
        import { setupAnimations, loadBrandData } from './js/app.js';

        async function loadContent() {
            try {
                const data = await loadBrandData();
                if (data && data.personal_brand) {
                    document.title = `Works | ${data.personal_brand.name}`;
                }

                const worksGrid = document.getElementById('works-grid');
                worksGrid.innerHTML = '';

                data.selected_works.forEach((work, index) => {
                    const el = document.createElement('a');
                    el.href = work.link;
                    el.target = "_blank";
                    el.rel = "noopener noreferrer";
                    el.className = 'compact-post-item fade-in';
                    el.dataset.delay = (index % 5) + 1;

                    el.innerHTML = `
                        <div class="compact-post-header">
                            <div class="compact-post-content">
                                <h3>${work.title} <span class="external-icon" style="font-size: 0.8rem; color: var(--text-secondary); margin-left: 6px;">↗</span></h3>
                            </div>
                        </div>
                        <p class="post-summary">${work.description}</p>
                        ${work.github ? `
                        <div style="margin-top: 16px; position: relative; z-index: 2;">
                            <object><a href="${work.github}" target="_blank" rel="noopener noreferrer" class="pill-link" style="font-size: 0.75rem; padding: 6px 14px;">View Source Code ↗</a></object>
                        </div>` : ''}
                    `;
                    worksGrid.appendChild(el);
                });

                setupAnimations(true);

            } catch (error) {
                console.error('Data hydration failed:', error);
                document.getElementById('works-grid').innerHTML = '<p>Failed to load works.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>

</html>
