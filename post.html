<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Read individual perspectives and journal entries from Adriana So, Strategic AI Integrator.">
    <title>Post - Strategic AI Intelligence</title>
    <!-- Marked.js lightweight parser for markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="css/shared.css?v=2">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="js/auth.js"></script>
</head>

<body>

    <nav>
        <div class="container">
            <a href="index.html" class="nav-brand" id="nav-brand-name">Adriana So</a>
            <div style="display: flex; align-items: center; gap: 24px; flex-wrap: wrap;">
                <div class="nav-links">
                    <a href="services.html">Services</a>
                    <a href="works.html">Works</a>
                    <a href="blog.html" class="active">Blog</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div id="auth-container" class="auth-wrapper"
                    style="min-width: 120px; display: flex; justify-content: flex-end;"></div>
            </div>
        </div>
    </nav>

    <div class="container fade-in">
        <a href="blog.html" class="back-link">← Back to Journal</a>

        <article id="post-content">
            <h1 id="post-title">Loading...</h1>
            <div id="post-body"></div>
        </article>

        <footer class="site-footer fade-in">
            <div class="footer-links">
                <a href="https://github.com/AdrianaSo123" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="https://www.linkedin.com/in/adriana-so-24071219b/" target="_blank"
                    rel="noopener noreferrer">LinkedIn</a>
            </div>
            <div class="footer-copyright">
                &copy; 2026 Adriana So
            </div>
        </footer>
    </div>

    <script type="module">
        import { loadBrandData, stripFrontmatter, setupAnimations } from './js/app.js';

        // Use marked safely
        marked.setOptions({
            headerIds: false,
            mangle: false
        });

        async function loadPost() {
            try {
                // Fetch brand title config
                await loadBrandData();

                // Identify slug requirement
                const params = new URLSearchParams(window.location.search);
                const slug = params.get('slug');

                if (!slug) {
                    throw new Error('No post slug provided in URL');
                }

                // Verify metadata 
                const indexRes = await fetch('posts/index.json');
                if (!indexRes.ok) throw new Error('Failed to load posts index');
                const posts = await indexRes.json();

                const postMeta = posts.find(p => p.slug === slug);
                if (!postMeta) {
                    throw new Error('Post not found in index registry');
                }

                document.title = `${postMeta.title} | Journal`;

                // Fetch actual markdown text file
                const mdRes = await fetch(`posts/${slug}.md`);
                if (!mdRes.ok) throw new Error('Failed to load markdown content');
                const markdown = await mdRes.text();

                // Strip standard frontmatter pattern
                const mdContent = stripFrontmatter(markdown);

                // Hydrate
                const htmlContent = DOMPurify.sanitize(marked.parse(mdContent));
                const tagsHtml = postMeta.tags && postMeta.tags.length > 0
                    ? `<div class="post-tags">${postMeta.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`
                    : '';

                const container = document.getElementById('post-content');
                container.innerHTML = `
                    <header class="post-header">
                        <h1>${postMeta.title}</h1>
                        <div class="post-meta">
                            <span>${postMeta.date}</span>
                            ${tagsHtml}
                        </div>
                    </header>

                    <div class="post-body-content">
                        ${htmlContent}
                    </div>
                `;

                setupAnimations(true);

            } catch (error) {
                console.error('Failed to load post:', error);
                document.getElementById('post-content').innerHTML = `
                    <h1>Perspective Missing</h1>
                    <p>${error.message}</p>
                    <a href="blog.html" class="btn">Back to Journal</a>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>

</html>
