<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Perspectives and journal entries on Strategic AI Intelligence and Design Engineering by Adriana So.">
    <title>Blog - Strategic AI Intelligence</title>
    <link rel="stylesheet" href="css/shared.css">
</head>

<body>

    <nav>
        <div class="container">
            <a href="index.html" class="nav-brand" id="nav-brand-name">Adriana So</a>
            <div class="nav-links">
                <a href="services.html">Services</a>
                <a href="works.html">Works</a>
                <a href="blog.html" class="active">Blog</a>
            </div>
        </div>
    </nav>

    <div class="container container-narrow">
        <!-- Compact Blog Listing Section -->
        <section id="blog-section" class="fade-in">
            <h2>Journal Archive</h2>
            <div id="posts-container" class="compact-post-list">
                <!-- Injected Posts -->
                <p>Loading perspectives...</p>
            </div>
        </section>

        <footer>
            Intelligently generated. Deterministically deployed.
        </footer>
    </div>

    <script type="module">
        import { setupAnimations, loadBrandData } from './js/app.js';

        // Data Fetching and Hydration
        async function loadContent() {
            try {
                // Keep the brand hydration to match the main site
                const data = await loadBrandData();
                if (data && data.personal_brand) {
                    document.title = `Journal | ${data.personal_brand.name}`;
                }

                // Fetch posts list
                const postsResponse = await fetch('posts/index.json');
                if (!postsResponse.ok) throw new Error('Failed to load posts index');
                const posts = await postsResponse.json();

                const container = document.getElementById('posts-container');
                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<p class="empty-state">No journal entries available yet.</p>';
                    return;
                }

                // Sort newest first
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));

                posts.forEach((post, index) => {
                    const postEl = document.createElement('a');
                    postEl.href = `post.html?slug=${post.slug}`;
                    postEl.className = 'compact-post-item fade-in';
                    postEl.dataset.delay = (index % 5) + 1; // Stagger intro

                    postEl.innerHTML = `
                        <div class="compact-post-header">
                            <div class="compact-post-content">
                                <h3>${post.title}</h3>
                            </div>
                            <div class="compact-post-meta">${post.date}</div>
                        </div>
                        ${post.summary ? `<p class="post-summary">${post.summary}</p>` : ''}
                    `;
                    container.appendChild(postEl);
                });

                setupAnimations(true);

            } catch (error) {
                console.error('Data hydration failed:', error);
                document.getElementById('posts-container').innerHTML = '<p class="empty-state">Failed to load perspectives.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>

</html>
